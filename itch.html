<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="token_1.png">
  <title>Published Work - Manratt Games</title>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <script src="https://kit.fontawesome.com/259dbc7eb6.js" crossorigin="anonymous"></script>

  <!-- Custom Styles -->
  <style>
    .published-container {
      max-width: 600px;
      margin: auto;
      padding: 30px;
      background: #ffffff;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      text-align: center;
    }
    .published-header h1 {
      font-size: 28px;
      font-weight: bold;
    }
    .published-description {
      font-size: 18px;
      margin-bottom: 25px;
    }
    .published-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Itch.io Button */
    .itch-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background-color: #333;
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background-color 0.3s ease-in-out;
    }
    .itch-link:hover {
      background-color: #fa5c5c; /* Itch.io's red */
    }
    .itch-logo {
      width: 40px;
      height: 40px;
    }

    /* Wargame Vault Button */
    .wgv-link {
      display: inline-block;
      background-color: #555;
      color: white;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background-color 0.3s ease-in-out;
    }
    .wgv-link:hover {
      background-color: #777;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="token_1.png" alt="Logo" width="60" height="60" class="brand-logo">
          <div class="ms-2">Manratt Games</div>
        </a>

        <!-- Navigation Links & Dropdowns -->
        <div class="d-flex flex-grow-1 justify-content-center">
          <!-- About Me Dropdown -->
          <div class="dropdown me-2">
            <button class="btn dropdown-toggle custom-dropdown-btn" type="button" id="aboutDropdown"
              data-bs-toggle="dropdown" aria-expanded="false">
              About Me
            </button>
            <ul class="dropdown-menu custom-dropdown-menu" aria-labelledby="aboutDropdown">
              <li><a class="dropdown-item custom-dropdown-item" href="resume.html">Resume</a></li>
              <li><a class="dropdown-item custom-dropdown-item" href="contact.html">Contact</a></li>
            </ul>
          </div>

          <!-- Game Design Dropdown -->
          <div class="dropdown me-2">
            <button class="btn dropdown-toggle custom-dropdown-btn" type="button" id="gameDesignDropdown"
              data-bs-toggle="dropdown" aria-expanded="false">
              Game Design
            </button>
            <ul class="dropdown-menu custom-dropdown-menu" aria-labelledby="gameDesignDropdown">
              <li><a class="dropdown-item custom-dropdown-item" href="itch.html">Itch.io</a></li>
              <li><a class="dropdown-item custom-dropdown-item" href="projects.html">WIP Projects</a></li>
            </ul>
          </div>

          <!-- Computer Science Dropdown -->
          <div class="dropdown">
            <button class="btn dropdown-toggle custom-dropdown-btn" type="button" id="compsciDropdown"
              data-bs-toggle="dropdown" aria-expanded="false">
              Computer Science
            </button>
            <ul class="dropdown-menu custom-dropdown-menu" aria-labelledby="compsciDropdown">
              <li><a class="dropdown-item custom-dropdown-item" href="compsciProjects.html">Projects</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- Published Work Section -->
  <main class="container py-5">
    <div class="published-container">
      <div class="published-header">
        <h1>My Published Work</h1>
      </div>
      <p class="published-description">
        Here are my officially published games and projects. You can find my digital releases on 
        <strong>Itch.io</strong> and my tabletop projects on <strong>Wargame Vault</strong>.
      </p>

      <div class="published-links">
        <!-- Itch.io Button -->
        <a href="https://man-ratt.itch.io/" target="_blank" class="itch-link">
          <img src="https://static.itch.io/images/itchio-textless-white.svg" class="itch-logo" alt="Itch.io Logo">
          Visit My Itch.io
        </a>

        <!-- Wargame Vault Button -->
        <a href="https://www.wargamevault.com/browse/pub/29426/Man-Ratt" target="_blank" class="wgv-link">
          Visit My Wargame Vault
        </a>
      </div>
    </div>

  </main>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
